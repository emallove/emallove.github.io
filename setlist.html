<style>
  .sm-wrap {
    --sm-bg: #0f1115;
    --sm-bg-flash: #2563eb;
    --sm-surface: #181b22;
    --sm-border: #2a2e38;
    --sm-text: #f3f4f6;
    --sm-text-dim: #9ca3af;
    --sm-text-note: #6b7280;
    --sm-accent: #3b82f6;
    --sm-accent-text: #eaf1ff;

    max-width: 420px;
    margin: 0 auto;
    background: var(--sm-bg);
    color: var(--sm-text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    border-radius: 18px;
    overflow: hidden;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
  }
  .sm-wrap * { box-sizing: border-box; }

  .sm-flashbox {
    transition: background-color 60ms linear;
    padding: 20px 16px 16px;
  }
  .sm-flashbox.sm-flash { background-color: var(--sm-bg-flash); }

  .sm-title {
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.04em;
    color: var(--sm-text-dim);
    text-transform: uppercase;
    text-align: center;
    margin: 0 0 8px;
  }

  .sm-bpm-row {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 24px;
    padding: 6px 0 2px;
  }
  .sm-bpm-btn {
    width: 44px; height: 44px;
    border-radius: 50%;
    border: 1px solid var(--sm-border);
    background: var(--sm-surface);
    color: var(--sm-text);
    font-size: 22px;
    line-height: 1;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
  }
  .sm-bpm-btn:active { background: var(--sm-accent); border-color: var(--sm-accent); }

  .sm-bpm-display { text-align: center; min-width: 110px; }
  .sm-bpm-num { font-size: 48px; font-weight: 700; line-height: 1; font-variant-numeric: tabular-nums; }
  .sm-bpm-label { font-size: 11px; color: var(--sm-text-dim); margin-top: 2px; letter-spacing: 0.08em; }

  .sm-dot {
    width: 22px; height: 22px;
    border-radius: 50%;
    background: var(--sm-border);
    margin: 12px auto 8px;
    transition: background-color 40ms linear, transform 40ms linear;
  }
  .sm-dot.sm-on { background: #fff; transform: scale(1.25); }

  .sm-play-wrap { padding: 2px 0 12px; }
  .sm-play-btn {
    width: 100%;
    padding: 14px;
    border-radius: 14px;
    border: none;
    background: var(--sm-accent);
    color: var(--sm-accent-text);
    font-size: 16px;
    font-weight: 600;
    display: flex; align-items: center; justify-content: center; gap: 10px;
    cursor: pointer;
  }
  .sm-play-btn.sm-stop { background: #3a3f4b; color: var(--sm-text); }
  .sm-play-btn svg { width: 17px; height: 17px; }

  .sm-now-playing {
    text-align: center;
    font-size: 12.5px;
    color: var(--sm-text-dim);
    min-height: 17px;
    padding: 0 4px 6px;
  }
  .sm-now-playing b { color: var(--sm-text); font-weight: 600; }

  .sm-search-wrap { padding: 2px 0 8px; }
  .sm-search-wrap input {
    width: 100%;
    padding: 10px 13px;
    border-radius: 10px;
    border: 1px solid var(--sm-border);
    background: var(--sm-surface);
    color: var(--sm-text);
    font-size: 14px;
    outline: none;
  }
  .sm-search-wrap input:focus { border-color: var(--sm-accent); }
  .sm-search-wrap input::placeholder { color: var(--sm-text-dim); }

  .sm-list {
    max-height: 360px;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
  }
  .sm-song-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 9px 10px;
    margin-bottom: 3px;
    border-radius: 10px;
    cursor: pointer;
    gap: 8px;
  }
  .sm-song-row.sm-active { background: rgba(59,130,246,0.18); }
  .sm-song-row:active { background: rgba(255,255,255,0.06); }

  .sm-song-info { overflow: hidden; flex: 1 1 auto; }

  .sm-song-title-row {
    display: flex;
    align-items: baseline;
    gap: 5px;
    white-space: nowrap;
    overflow: hidden;
  }
  .sm-song-title {
    font-size: 14px; font-weight: 600;
    overflow: hidden; text-overflow: ellipsis;
    flex: 0 1 auto;
    min-width: 0;
  }
  .sm-song-instr {
    font-size: 13px;
    flex: 0 0 auto;
    line-height: 1;
  }
  .sm-song-artist {
    font-size: 12px; color: var(--sm-text-dim);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    margin-top: 1px;
  }
  .sm-song-notes {
    font-size: 11px; color: var(--sm-text-note);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    margin-top: 2px;
    font-style: italic;
  }

  .sm-song-right {
    flex: 0 0 auto;
    display: flex;
    align-items: center;
    gap: 6px;
    margin-left: 4px;
  }
  .sm-song-key {
    font-size: 11px;
    color: var(--sm-text-note);
    background: var(--sm-surface);
    border: 1px solid var(--sm-border);
    border-radius: 4px;
    padding: 1px 5px;
    font-weight: 600;
    letter-spacing: 0.02em;
  }
  .sm-song-tempo {
    font-size: 13.5px; font-weight: 600;
    color: var(--sm-text-dim);
    min-width: 32px;
    text-align: right;
  }

  .sm-empty {
    text-align: center;
    color: var(--sm-text-dim);
    font-size: 13px;
    padding: 28px 16px;
  }

  .sm-list::-webkit-scrollbar { width: 0; height: 0; }
</style>

<div class="sm-wrap">
  <div class="sm-flashbox" id="smFlashbox">

    <p class="sm-title">Setlist metronome</p>

    <div class="sm-bpm-row">
      <button class="sm-bpm-btn" id="smBpmDown" aria-label="Decrease tempo">&minus;</button>
      <div class="sm-bpm-display">
        <div class="sm-bpm-num" id="smBpmVal">120</div>
        <div class="sm-bpm-label">BPM</div>
      </div>
      <button class="sm-bpm-btn" id="smBpmUp" aria-label="Increase tempo">+</button>
    </div>

    <div class="sm-dot" id="smDot"></div>

    <div class="sm-play-wrap">
      <button class="sm-play-btn" id="smPlayBtn">
        <svg id="smPlayIcon" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
        <span id="smPlayLabel">Start</span>
      </button>
    </div>

    <div class="sm-now-playing" id="smNowPlaying"></div>

    <div class="sm-search-wrap">
      <input id="smSearch" type="text" placeholder="Search songs or artists" autocomplete="off" autocorrect="off" spellcheck="false">
    </div>

    <div class="sm-list" id="smSongList"></div>

  </div>
</div>

<script>
(function() {
  const songs = [ { "title": "Someone New", "artist": "Hozier", "tempo": 96, "key": "F", "instrumentation": "🎸", "notes": "" }, { "title": "Dancing in the Dark", "artist": "Bruce Springsteen", "tempo": 134, "key": "G", "instrumentation": "🎸", "notes": "" }, { "title": "I Want To Hold Your Hand", "artist": "Beatles", "tempo": 134, "key": "F", "instrumentation": "🎸", "notes": "" }, { "title": "I Had Some Help", "artist": "Post Malone & Morgan Wallen", "tempo": 133, "key": "A", "instrumentation": "🎸", "notes": "" }, { "title": "Too Sweet", "artist": "Hozier", "tempo": 122, "key": "Em", "instrumentation": "🎸", "notes": "" }, { "title": "Just What I Needed", "artist": "Cars", "tempo": 132, "key": "D", "instrumentation": "🎸", "notes": "" }, { "title": "Linger", "artist": "Cranberries", "tempo": 100, "key": "A", "instrumentation": "🎸", "notes": "" }, { "title": "In My Life", "artist": "Beatles", "tempo": 108, "key": "A", "instrumentation": "🎸", "notes": "" }, { "title": "Don't Dream It's Over", "artist": "Crowded House", "tempo": 87, "key": "D", "instrumentation": "🎸", "notes": "" }, { "title": "Out of My League", "artist": "FItz and the Tantrums", "tempo": 175, "key": "D", "instrumentation": "🎸", "notes": "" }, { "title": "In Your Eyes", "artist": "Peter Gabriel", "tempo": 93, "key": "Am", "instrumentation": "🎸", "notes": "" }, { "title": "Adore You", "artist": "Harry Styles", "tempo": 104, "key": "Am", "instrumentation": "🎸", "notes": "" }, { "title": "Don't Look Back At Anger", "artist": "Oasis", "tempo": 86, "key": "Bb", "instrumentation": "🎸", "notes": "" }, { "title": "Young Americans", "artist": "David Bowie", "tempo": 97, "key": "Bb", "instrumentation": "🎸", "notes": "" }, { "title": "Save Your Tears", "artist": "The Weeknd", "tempo": 123, "key": "A", "instrumentation": "🎹", "notes": "" }, { "title": "Fire and Rain", "artist": "James Taylor", "tempo": 81, "key": "C", "instrumentation": "🎹", "notes": "" }, { "title": "Rocketman", "artist": "Elton John", "tempo": 134, "key": "Bb", "instrumentation": "🎹", "notes": "" }, { "title": "Light My Fire", "artist": "Doors", "tempo": 134, "key": "D", "instrumentation": "🎹", "notes": "" }, { "title": "Time After Time", "artist": "Cyndi Lauper", "tempo": 135, "key": "G", "instrumentation": "🎹", "notes": "" }, { "title": "Everybody Wants to Rule the World", "artist": "Tears for Fears", "tempo": 117, "key": "C", "instrumentation": "🎹", "notes": "" }, { "title": "Uptown Girl", "artist": "Billy Joel", "tempo": 134, "key": "C", "instrumentation": "🎹", "notes": "" }, { "title": "Tiny Dancer", "artist": "Elton John", "tempo": 150, "key": "C", "instrumentation": "🎹", "notes": "" }, { "title": "Let It Be", "artist": "Beatles", "tempo": 75, "key": "Bb", "instrumentation": "🎹", "notes": "" }, { "title": "Lean on Me", "artist": "Bill Withers", "tempo": 80, "key": "Bb", "instrumentation": "🎹", "notes": "" }, { "title": "Isn't She Lovely", "artist": "Stevie Wonder", "tempo": 124, "key": "C", "instrumentation": "🎹", "notes": "" }, { "title": "My Cherie Amour", "artist": "Stevie Wonder", "tempo": 106, "key": "D△7", "instrumentation": "🎹", "notes": "" }, { "title": "Lovely Day", "artist": "BIll Withers", "tempo": 103, "key": "E", "instrumentation": "🎹", "notes": "" }, { "title": "The Longest Time", "artist": "Billy Joel", "tempo": 172, "key": "Db", "instrumentation": "🎹", "notes": "" }, { "title": "Everybody's Changing", "artist": "Keane", "tempo": 99, "key": "Ab", "instrumentation": "🎹", "notes": "" }, { "title": "Head Over Heels", "artist": "Tears for Fears", "tempo": 101, "key": "G", "instrumentation": "🎹", "notes": "" }, { "title": "Changes", "artist": "David Bowie", "tempo": 117, "key": "Bb", "instrumentation": "🎹", "notes": "" }, { "title": "Speed of Sound", "artist": "Coldplay", "tempo": 128, "key": "D", "instrumentation": "🎹", "notes": "" }, { "title": "Thank You", "artist": "Led Zeppelin", "tempo": 83, "key": "Bb", "instrumentation": "🎹", "notes": "" }, { "title": "For Once In My Life", "artist": "Stevie Wonder", "tempo": 114, "key": "C", "instrumentation": "🎹", "notes": "" }, { "title": "Peg", "artist": "Steely Dan", "tempo": 122, "key": "Bb", "instrumentation": "🎹", "notes": "" }, { "title": "Stepping Out", "artist": "Joe Jackson", "tempo": 165, "key": "F#", "instrumentation": "🎹", "notes": "" }, { "title": "This Old Heart of Mine", "artist": "Isley Brothers", "tempo": 135, "key": "C", "instrumentation": "🎹", "notes": "" }, { "title": "All I Need Is a Miracle", "artist": "Mike and The Mechanics", "tempo": 141, "key": "D", "instrumentation": "🎹", "notes": "" }, { "title": "As It Was", "artist": "Harry Styles", "tempo": 179, "key": "Gb", "instrumentation": "🎸", "notes": "" }, { "title": "When I Come Around", "artist": "Green Day", "tempo": 103, "key": "F#", "instrumentation": "🎸", "notes": "" }, { "title": "Tighten Up", "artist": "Black Keys", "tempo": 100, "key": "Fm", "instrumentation": "🎸", "notes": "" }, { "title": "Reelin' In the Years", "artist": "Steely Dan", "tempo": 140, "key": "A", "instrumentation": "🎹", "notes": "" }, { "title": "You Make Loving Fun", "artist": "Fleetwood Mac", "tempo": 132, "key": "Ebm", "instrumentation": "🎹", "notes": "" }, { "title": "(Sittin' On) the Dock of the Bay", "artist": "Otis Redding", "tempo": 109, "key": "E", "instrumentation": "🎻", "notes": "" }, { "title": "Faith", "artist": "George Michael", "tempo": 101, "key": "A", "instrumentation": "🎻", "notes": "" }, { "title": "Crazy Little Thing Called Love", "artist": "Queen", "tempo": 157, "key": "C", "instrumentation": "🎻", "notes": "" }, { "title": "Proud Mary", "artist": "Creedence Clearwater Revival", "tempo": 126, "key": "D", "instrumentation": "🎻", "notes": "" }, { "title": "Man Who Sold the World", "artist": "David Bowie", "tempo": 123, "key": "Dm", "instrumentation": "🎸", "notes": "" }, { "title": "Have You Ever Seen the Rain", "artist": "Creedence Clearwater Revival", "tempo": 121, "key": "A", "instrumentation": "🎻", "notes": "" }, { "title": "Stand By Me", "artist": "Ben E. King", "tempo": 124, "key": "Gb", "instrumentation": "🎻", "notes": "" }, { "title": "Brown Eyed Girl", "artist": "Van Morisson", "tempo": 154, "key": "G", "instrumentation": "🎻", "notes": "" }, { "title": "Wild World", "artist": "Cat Stevens", "tempo": 81, "key": "C", "instrumentation": "🎻", "notes": "" }, { "title": "You Are the Best Thing", "artist": "Ray LaMontagne", "tempo": 89, "key": "Gb", "instrumentation": "🎻", "notes": "" }, { "title": "Traveller", "artist": "Chris Stapleton", "tempo": 92, "key": "C", "instrumentation": "🎻", "notes": "" }, { "title": "Who'll Stop the Rain", "artist": "Creedence Clearwater Revival", "tempo": 129, "key": "E", "instrumentation": "🎻", "notes": "" }, { "title": "Heart of Gold", "artist": "Neil Young", "tempo": 91, "key": "Em", "instrumentation": "🎻", "notes": "" }, { "title": "Yellow", "artist": "Coldplay", "tempo": 92, "key": "G", "instrumentation": "🎻", "notes": "" }, { "title": "Northern Attitude", "artist": "Noah Kahan", "tempo": 125, "key": "D", "instrumentation": "🎻", "notes": "" }, ];

  let bpm = 120, playing = false, audioCtx = null;
  let nextNoteTime = 0, timerID = null, selectedIdx = null;
  const lookahead = 25.0, scheduleAheadTime = 0.1;

  const flashbox  = document.getElementById('smFlashbox');
  const bpmVal    = document.getElementById('smBpmVal');
  const dot       = document.getElementById('smDot');
  const playBtn   = document.getElementById('smPlayBtn');
  const playIcon  = document.getElementById('smPlayIcon');
  const playLabel = document.getElementById('smPlayLabel');
  const nowPlay   = document.getElementById('smNowPlaying');
  const search    = document.getElementById('smSearch');
  const songList  = document.getElementById('smSongList');

  const ICON_PLAY = '<path d="M8 5v14l11-7z"/>';
  const ICON_STOP = '<rect x="6" y="6" width="12" height="12" rx="1.5"/>';

  function esc(str) {
    const d = document.createElement('div');
    d.textContent = str;
    return d.innerHTML;
  }

  function renderList(filter) {
    const f = (filter || '').toLowerCase().trim();
    songList.innerHTML = '';
    let shown = 0;
    songs.forEach((s, i) => {
      if (f && !s.title.toLowerCase().includes(f) && !s.artist.toLowerCase().includes(f)) return;
      shown++;
      const row = document.createElement('div');
      row.className = 'sm-song-row' + (i === selectedIdx ? ' sm-active' : '');

      const instrHtml = s.instrumentation
        ? '<span class="sm-song-instr">' + esc(s.instrumentation) + '</span>'
        : '';
      const notesHtml = s.notes
        ? '<div class="sm-song-notes">' + esc(s.notes) + '</div>'
        : '';

      row.innerHTML =
        '<div class="sm-song-info">' +
          '<div class="sm-song-title-row">' +
            '<span class="sm-song-title">' + esc(s.title) + '</span>' +
            instrHtml +
          '</div>' +
          '<div class="sm-song-artist">' + esc(s.artist) + '</div>' +
          notesHtml +
        '</div>' +
        '<div class="sm-song-right">' +
          (s.key ? '<span class="sm-song-key">' + esc(s.key) + '</span>' : '') +
          '<span class="sm-song-tempo">' + s.tempo + '</span>' +
        '</div>';

      row.addEventListener('click', () => {
        selectedIdx = i;
        bpm = s.tempo;
        bpmVal.textContent = bpm;
        nowPlay.innerHTML = '<b>' + esc(s.title) + '</b> &mdash; ' + esc(s.artist);
        renderList(search.value);
        if (!playing) startMetronome();
      });
      songList.appendChild(row);
    });
    if (!shown) songList.innerHTML = '<div class="sm-empty">No matching songs</div>';
  }

  function clampBpm() { bpm = Math.max(20, Math.min(300, bpm)); bpmVal.textContent = bpm; }
  document.getElementById('smBpmUp').addEventListener('click', () => { bpm++; clampBpm(); });
  document.getElementById('smBpmDown').addEventListener('click', () => { bpm--; clampBpm(); });
  search.addEventListener('input', () => renderList(search.value));

  function scheduleNote(time) {
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.connect(gain); gain.connect(audioCtx.destination);
    osc.frequency.value = 1000;
    gain.gain.setValueAtTime(0.4, time);
    gain.gain.exponentialRampToValueAtTime(0.001, time + 0.05);
    osc.start(time); osc.stop(time + 0.05);
    const delay = Math.max(0, (time - audioCtx.currentTime) * 1000);
    setTimeout(() => {
      dot.classList.add('sm-on'); flashbox.classList.add('sm-flash');
      setTimeout(() => { dot.classList.remove('sm-on'); flashbox.classList.remove('sm-flash'); }, 90);
    }, delay);
  }

  function scheduler() {
    while (nextNoteTime < audioCtx.currentTime + scheduleAheadTime) {
      scheduleNote(nextNoteTime);
      nextNoteTime += 60.0 / bpm;
    }
    timerID = setTimeout(scheduler, lookahead);
  }

  function startMetronome() {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    if (audioCtx.state === 'suspended') audioCtx.resume();
    playing = true;
    playLabel.textContent = 'Stop';
    playBtn.classList.add('sm-stop');
    playIcon.innerHTML = ICON_STOP;
    nextNoteTime = audioCtx.currentTime + 0.05;
    scheduler();
  }

  function stopMetronome() {
    playing = false;
    playLabel.textContent = 'Start';
    playBtn.classList.remove('sm-stop');
    playIcon.innerHTML = ICON_PLAY;
    clearTimeout(timerID);
    dot.classList.remove('sm-on');
    flashbox.classList.remove('sm-flash');
  }

  playBtn.addEventListener('click', () => { if (playing) stopMetronome(); else startMetronome(); });
  renderList('');
})();
</script>
